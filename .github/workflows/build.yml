name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Install Qt system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 \
            libxcb-image0 libxcb-shape0 libxkbcommon-x11-0 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xkb1

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "3508985146f1b1d248c67ead13f8f54be5b4f5da"

      - name: Set CMAKE_TOOLCHAIN_FILE (Linux/macOS)
        if: runner.os != 'Windows'
        run: echo "CMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" >> $GITHUB_ENV

      - name: Set CMAKE_TOOLCHAIN_FILE (Windows)
        if: runner.os == 'Windows'
        run: echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Install Pluton (editable, with dev deps)
        env:
          # run-vcpkg sets VCPKG_BINARY_SOURCES="clear;x-gha,readwrite" globally,
          # but ACTIONS_RUNTIME_TOKEN / ACTIONS_CACHE_URL are not exposed to user
          # steps by default, causing vcpkg install to fail when invoked via
          # scikit-build-core. Disable the GHA binary cache here; vcpkg will build
          # from source (acceptable for M0 with only gtest).
          VCPKG_BINARY_SOURCES: clear
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Python tests
        run: pytest -v

      - name: Configure C++ tests
        env:
          VCPKG_BINARY_SOURCES: clear
        run: cmake -B build/tests -S . -G Ninja

      - name: Build C++ tests
        run: cmake --build build/tests

      - name: Run C++ tests
        working-directory: build/tests
        run: ctest --output-on-failure
