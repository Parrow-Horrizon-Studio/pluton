name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Install Qt system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 \
            libxcb-image0 libxcb-shape0 libxkbcommon-x11-0 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xkb1

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "56bb2411609227288b70117ead2c47585ba07713"

      - name: Set CMAKE_TOOLCHAIN_FILE (Linux/macOS)
        if: runner.os != 'Windows'
        run: echo "CMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" >> $GITHUB_ENV

      - name: Set CMAKE_TOOLCHAIN_FILE (Windows)
        if: runner.os == 'Windows'
        run: echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Export GitHub Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Pluton (editable, with dev deps)
        env:
          # Use vcpkg's GitHub Actions binary cache so Assimp (M6c) builds once
          # and is restored on later runs. The ACTIONS_* tokens are exported by
          # the "Export GitHub Actions cache env for vcpkg" step above.
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Python tests
        run: pytest -v

      - name: Install nanobind for standalone CMake
        run: pip install nanobind

      - name: Configure C++ tests (Linux)
        if: runner.os == 'Linux'
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: |
          NANOBIND_DIR=$(python -c "import nanobind; print(nanobind.cmake_dir())")
          cmake -B build/tests -S . -G Ninja -Dnanobind_DIR="$NANOBIND_DIR"

      - name: Configure C++ tests (Windows)
        if: runner.os == 'Windows'
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: |
          $nanobindDir = python -c "import nanobind; print(nanobind.cmake_dir())"
          cmake -B build/tests -S . -G "Visual Studio 17 2022" -A x64 "-Dnanobind_DIR=$nanobindDir"

      - name: Build C++ tests
        run: cmake --build build/tests --config Release

      - name: Run C++ tests
        working-directory: build/tests
        run: ctest --output-on-failure -C Release
